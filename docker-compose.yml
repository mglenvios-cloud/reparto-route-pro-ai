version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: routeproai-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: routeproai
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: routeproai-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/routeproai?schema=public"
      JWT_SECRET: "route-pro-ai-super-secret-key-2024"
      JWT_REFRESH_SECRET: "route-pro-ai-refresh-secret-key-2024"
      JWT_EXPIRES_IN: "15m"
      JWT_REFRESH_EXPIRES_IN: "7d"
      NODE_ENV: production
      FRONTEND_URL: "http://localhost:5173"
      CORS_ORIGIN: "http://localhost:5173"
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: routeproai-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
